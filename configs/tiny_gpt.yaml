run_name: tiny_gpt
seed: 42

data:
  train_bin: data/processed/tiny_gpt/train.bin
  valid_bin: data/processed/tiny_gpt/valid.bin
  tokenizer_path: data/processed/tiny_gpt/tokenizer.json
  raw_corpus_path: data/raw/sample_corpus.txt
  cleaned_corpus_path: data/processed/tiny_gpt/corpus_clean.txt
  train_split: 0.8
  vocab_size: 16000
  min_frequency: 2
  seq_length: 64

model:
  vocab_size: 16000
  n_layer: 6
  n_head: 6
  n_embd: 384
  dropout: 0.1
  bias: false

train:
  device: auto
  dtype: auto
  batch_size: 4
  grad_accum_steps: 8
  num_steps: 200
  eval_interval: 25
  eval_iters: 20
  log_interval: 10
  learning_rate: 3.0e-4
  min_learning_rate: 3.0e-5
  warmup_steps: 50
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  grad_clip: 1.0
  num_workers: 0

generation:
  max_new_tokens: 80
  temperature: 0.9
  top_k: 50
  top_p: 0.9

paths:
  output_dir: outputs/tiny_gpt
  checkpoint_dir: outputs/tiny_gpt/checkpoints
  sample_dir: outputs/tiny_gpt/samples
